version: '3.9'

# GigGuard X — Development Docker Compose
# =========================================
# Run with: docker compose -f docker-compose.dev.yml up

services:

  # ── DATABASES ───────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: gigguard_postgres
    environment:
      POSTGRES_USER: gigguard
      POSTGRES_PASSWORD: gigguard123
      POSTGRES_DB: gigguard_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigguard -d gigguard_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gigguard_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ── BACKEND ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: gigguard_backend
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://gigguard:gigguard123@postgres:5432/gigguard_db
      - DATABASE_SYNC_URL=postgresql://gigguard:gigguard123@postgres:5432/gigguard_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./backend:/app
      - ml_models:/app/app/ml/models
      - rag_index:/app/app/rag
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: on-failure

  # ── CELERY WORKER ───────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: gigguard_celery
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://gigguard:gigguard123@postgres:5432/gigguard_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./backend:/app
      - ml_models:/app/app/ml/models
      - rag_index:/app/app/rag
    depends_on:
      - postgres
      - redis
      - backend
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    restart: on-failure

  # ── CELERY BEAT (scheduler) ─────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: gigguard_celery_beat
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://gigguard:gigguard123@postgres:5432/gigguard_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./backend:/app
    depends_on:
      - celery_worker
    command: celery -A app.celery_app beat --loglevel=info
    restart: on-failure

  # ── FRONTEND ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: gigguard_frontend
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
  ml_models:
  rag_index:
